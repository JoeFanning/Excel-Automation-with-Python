name: Compile Cross-Platform GUI Executables for Linux Windows and Mac

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-executables:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Desktop-Application-Windows
            artifact_path: dist/main.exe
          - os: macos-latest
            artifact_name: Desktop-Application-Mac
            artifact_path: dist/main.app
          - os: ubuntu-latest
            artifact_name: Desktop-Application-Linux
            artifact_path: dist/main
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        # Optional check if requirements file is missing in subfolders
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pyinstaller requests
      shell: bash

    - name: Compile Standalone Application
      run: |
        pyinstaller --noconsole --onefile main.py

    - name: Upload Compiled Binary Packages
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_path }}
        # Prevents build failure flags if a runner system has path compilation anomalies
        if-no-files-found: error
