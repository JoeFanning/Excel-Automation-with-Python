name: Automated Cloud Email Reporter

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  run-mailer-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # FIXED: Added matplotlib directly into the automated cloud installation array
    - name: Install API and Data Dependencies
      run: |
        pip install requests pandas openpyxl matplotlib

    - name: Locate and Run Mailer Script
      env:
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      run: |
        SCRIPT_PATH=$(find . -name "run_reporter.py" -print -quit)
        python "$SCRIPT_PATH"
