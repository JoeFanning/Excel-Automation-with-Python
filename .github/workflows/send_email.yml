
name: Automated Cloud Email Reporter

on:
  push:
    branches:
      - main
    paths:
      - 'sales_analysis_report.xlsx' # Triggers immediately when your desktop app updates this file

jobs:
  run-mailer-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Email Reporter Script
      env:
        # Pulls your hidden Brevo keys securely out of your GitHub settings
        BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
        BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
      run: python run_reporter.py
