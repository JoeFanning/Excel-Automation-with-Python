   name: Automated Cloud Email Reporter

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  run-mailer-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install API and Data Dependencies
      run: |
        pip install requests pandas openpyxl

    - name: Locate and Run Mailer Script
      env:
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        AZURE_SENDER_EMAIL: ${{ secrets.AZURE_SENDER_EMAIL }}
      run: |
        SCRIPT_PATH=$(find . -name "run_reporter.py" -print -quit)
        if [ -z "$SCRIPT_PATH" ]; then
          echo "CRITICAL ERROR: run_reporter.py cannot be found anywhere in this repository!"
          exit 1
        fi
        echo "Found script at: $SCRIPT_PATH"
        python "$SCRIPT_PATH"
